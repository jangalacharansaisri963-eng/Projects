Name: Python APK Generator

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Date
        id: get-date
        run: |
          echo "date=$(/bin/date -u "+%Y%m%d")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Cache Buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-${{ steps.get-date.outputs.date }}-${{ hashFiles('buildozer.spec') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Configured Java 17 home path explicitly to bypass legacy Android tool detection
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Enhanced dependency set: Added libsqlite3-dev, lld, and missing auto-tools for API 33 architectures
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libncurses5 libstdc++6 openjdk-17-jdk unzip zlib1g-dev libffi-dev libssl-dev libsqlite3-dev lld autoconf automake libtool

      # Cleared Cython pin rules to allow 3.0.x compliance required by modern API 33 recipes
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install cython buildozer

      # Forced environment flags to explicitly hook onto JDK 17 during buildozer invocation
      - name: Build with Buildozer Direct Engine
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          buildozer android debug

      - name: Upload Downloadable Python APK
        uses: actions/upload-artifact@v4
        with:
          name: TicTacToe-Python-APK
          path: bin/*.apk
          retention-days: 7
          
